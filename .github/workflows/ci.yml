name: CI

on:
  push:
    branches: [ master ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            optimizerDuck/optimizerDuck.csproj
            optimizerDuck.Test/optimizerDuck.Test.csproj

      - name: Restore
        run: dotnet restore optimizerDuck.slnx

      - name: Build
        run: dotnet build optimizerDuck.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test optimizerDuck.Test/optimizerDuck.Test.csproj --configuration Release --no-build
